name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: gosuto
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: gosuto.exe
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config libglib2.0-dev libva-dev libx11-dev libxi-dev libxtst-dev

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '-C target-feature=+crt-static' || '' }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar czf gosuto-${{ github.event.release.tag_name }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release ${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -DestinationPath "gosuto-${{ github.event.release.tag_name }}-${{ matrix.target }}.zip"

      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: gosuto-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          asset_name: gosuto-${{ github.event.release.tag_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          asset_content_type: application/octet-stream

      - name: Upload Windows exe artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 1

  msix:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows exe artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: msix

      - name: Extract version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          echo "MSIX_VERSION=$ver.0" >> $env:GITHUB_OUTPUT

      - name: Patch AppxManifest.xml
        shell: pwsh
        run: |
          $manifest = Get-Content msix/AppxManifest.xml -Raw
          $manifest = $manifest -replace 'REPLACE_WITH_IDENTITY_NAME', '${{ secrets.MSIX_IDENTITY_NAME }}'
          $manifest = $manifest -replace 'REPLACE_WITH_PUBLISHER_ID', '${{ secrets.MSIX_PUBLISHER_ID }}'
          $manifest = $manifest -replace 'REPLACE_WITH_PUBLISHER_DISPLAY', '${{ secrets.MSIX_PUBLISHER_DISPLAY }}'
          $manifest = $manifest -replace 'REPLACE_WITH_VERSION', '${{ steps.version.outputs.MSIX_VERSION }}'
          Set-Content msix/AppxManifest.xml $manifest

      - name: Create MSIX package
        shell: pwsh
        run: |
          $sdkDir = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1
          & "$sdkDir\x64\makeappx.exe" pack /f msix/mapping.txt /p gosuto.msix /o

      - name: Upload MSIX to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: gosuto.msix
          asset_name: gosuto-${{ github.event.release.tag_name }}-x64.msix
          asset_content_type: application/msix

      - name: Publish to Microsoft Store
        if: env.AZURE_AD_TENANT_ID != ''
        shell: pwsh
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          STORE_APP_ID: ${{ secrets.STORE_APP_ID }}
        run: |
          dotnet tool install --global MSStore.CLI
          msstore publish gosuto.msix `
            --tenantId $env:AZURE_AD_TENANT_ID `
            --clientId $env:AZURE_AD_CLIENT_ID `
            --clientSecret $env:AZURE_AD_CLIENT_SECRET `
            --appId $env:STORE_APP_ID

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config libglib2.0-dev libva-dev libx11-dev libxi-dev libxtst-dev

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: publish

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
